services:
  postgres:
    image: postgres:17-bookworm
    container_name: ie212-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bigdata_net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ie212-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - bigdata_net

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: ie212-minio-bootstrap
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...';
        sleep 2;
      done &&
      mc mb --ignore-existing local/${MINIO_BUCKET_RAW} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_PROCESSED} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_MODELS} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_ARTIFACTS}
      "
    networks:
      - bigdata_net

volumes:
  postgres_data:
  minio_data:

networks:
  bigdata_net:
    driver: bridge